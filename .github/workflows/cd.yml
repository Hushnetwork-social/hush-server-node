name: CD - HushServerNode

on:
  # Trigger on version tags
  push:
    tags:
      - 'HushServerNode-v[0-9]+.[0-9]+.[0-9]+'

  # Manual trigger option
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 1.2.3). Leave empty to use latest commit.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hushnetwork-social/hushservernode

jobs:
  # ============================================
  # CI GATE — must pass before deploying
  # ============================================
  ci:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    defaults:
      run:
        working-directory: Node

    steps:
    - uses: actions/checkout@v5

    - name: Checkout Hush Web Client for crypto interop fixtures
      uses: actions/checkout@v5
      with:
        repository: Hushnetwork-social/hush-web-client
        path: hush-web-client

    - name: Setup Node.js for crypto fixture generator
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: hush-web-client/package-lock.json

    - name: Install Hush Web Client fixture dependencies
      working-directory: hush-web-client
      run: npm ci

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Setup Rust
      working-directory: .
      run: |
        rustup toolchain install stable --profile minimal
        rustup default stable

    - name: Restore dependencies
      run: dotnet restore

    - name: Build SP-07 Rust worker
      working-directory: Tools/HushSp07RustWorker
      run: cargo build --release --locked

    - name: Test SP-07 Rust worker
      working-directory: Tools/HushSp07RustWorker
      run: cargo test --release --locked

    - name: Build
      run: dotnet build --configuration Release --no-restore
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Unit Tests
      run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Performance&Category!=PerformanceTest&Category!=E2E&Category!=HS-INT-087-CROSS-RUNTIME-PROOF"
      env:
        HUSH_WEB_CLIENT_ROOT: ${{ github.workspace }}/hush-web-client
        HUSH_SP07_RUST_WORKER_PATH: ${{ github.workspace }}/Tools/HushSp07RustWorker/target/release/hush-sp07-rust-worker

    - name: Publish HushVoting verifier release bundle
      run: dotnet publish ../Tools/HushVotingVerifier/HushVotingVerifier.csproj --configuration Release --no-restore --output ../release-evidence/hush-voting-verifier

    - name: Write SP-08 verifier and SP-07 worker release component manifests
      working-directory: .
      run: |
        set -euo pipefail
        evidence_mode="development_placeholder"
        is_placeholder=true
        if [[ "${{ github.event_name }}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
          evidence_mode="official_sp08"
          is_placeholder=false
        fi

        verifier_digest="sha256:$(sha256sum release-evidence/hush-voting-verifier/HushVotingVerifier.dll | cut -d' ' -f1)"
        verifier_project_hash="sha256:$(sha256sum Tools/HushVotingVerifier/HushVotingVerifier.csproj | cut -d' ' -f1)"
        sp07_worker_path="Tools/HushSp07RustWorker/target/release/hush-sp07-rust-worker"
        sp07_worker_digest="sha256:$(sha256sum "${sp07_worker_path}" | cut -d' ' -f1)"
        sp07_cargo_lock_hash="sha256:$(sha256sum Tools/HushSp07RustWorker/Cargo.lock | cut -d' ' -f1)"
        verifier_reference="github-actions://${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/hush-voting-verifier-release"
        sp07_reference="github-actions://${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/sp07-rust-worker-release"

        jq -n \
          --arg componentId "standalone_verifier" \
          --arg componentType "dotnet_tool" \
          --arg evidenceMode "${evidence_mode}" \
          --arg artifactName "HushVotingVerifier.dll" \
          --arg artifactDigest "${verifier_digest}" \
          --arg sourceCommit "${GITHUB_SHA}" \
          --arg sourceTag "${GITHUB_REF_NAME}" \
          --arg immutableReference "${verifier_reference}" \
          --arg buildWorkflowRunId "${GITHUB_RUN_ID}" \
          --arg verifierProjectHash "${verifier_project_hash}" \
          --argjson isPlaceholder "${is_placeholder}" \
          '{
            componentId: $componentId,
            componentType: $componentType,
            evidenceMode: $evidenceMode,
            artifactName: $artifactName,
            artifactDigest: $artifactDigest,
            sourceCommit: $sourceCommit,
            sourceTag: $sourceTag,
            immutableReference: $immutableReference,
            buildWorkflowRunId: $buildWorkflowRunId,
            distributionReference: $immutableReference,
            signingFingerprint: null,
            isPlaceholder: $isPlaceholder,
            projectFileHash: $verifierProjectHash
          }' > release-evidence/sp08-standalone-verifier-component.json

        jq -n \
          --arg componentId "sp07_proof_worker" \
          --arg componentType "native_binary" \
          --arg evidenceMode "${evidence_mode}" \
          --arg artifactName "hush-sp07-rust-worker" \
          --arg artifactDigest "${sp07_worker_digest}" \
          --arg sourceCommit "${GITHUB_SHA}" \
          --arg sourceTag "${GITHUB_REF_NAME}" \
          --arg immutableReference "${sp07_reference}" \
          --arg buildWorkflowRunId "${GITHUB_RUN_ID}" \
          --arg cargoLockHash "${sp07_cargo_lock_hash}" \
          --argjson isPlaceholder "${is_placeholder}" \
          '{
            componentId: $componentId,
            componentType: $componentType,
            evidenceMode: $evidenceMode,
            artifactName: $artifactName,
            artifactDigest: $artifactDigest,
            sourceCommit: $sourceCommit,
            sourceTag: $sourceTag,
            immutableReference: $immutableReference,
            buildWorkflowRunId: $buildWorkflowRunId,
            distributionReference: $immutableReference,
            signingFingerprint: null,
            isPlaceholder: $isPlaceholder,
            cargoLockHash: $cargoLockHash
          }' > release-evidence/sp08-sp07-worker-component.json

        {
          echo "### SP-08 Verifier And SP-07 Worker Evidence"
          echo ""
          echo "- Evidence mode: \`${evidence_mode}\`"
          echo "- Verifier digest: \`${verifier_digest}\`"
          echo "- SP-07 worker digest: \`${sp07_worker_digest}\`"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload HushVoting verifier release bundle
      uses: actions/upload-artifact@v4
      with:
        name: hush-voting-verifier-release
        path: release-evidence/hush-voting-verifier

    - name: Upload SP-07 Rust worker release binary
      uses: actions/upload-artifact@v4
      with:
        name: sp07-rust-worker-release
        path: Tools/HushSp07RustWorker/target/release/hush-sp07-rust-worker

    - name: Upload SP-08 verifier and SP-07 worker component manifests
      uses: actions/upload-artifact@v4
      with:
        name: sp08-verifier-sp07-release-components
        path: |
          release-evidence/sp08-standalone-verifier-component.json
          release-evidence/sp08-sp07-worker-component.json

    - name: Publish SP-08 verifier and SP-07 worker evidence to GitHub Release
      if: github.event_name == 'push' && github.ref_type == 'tag'
      working-directory: .
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Automated SP-08 release evidence for ${GITHUB_REF_NAME}."
        gh release upload "${GITHUB_REF_NAME}" \
          release-evidence/sp08-standalone-verifier-component.json \
          release-evidence/sp08-sp07-worker-component.json \
          --clobber

    - name: Write SP-08 protocol package and circuit key evidence
      working-directory: .
      run: |
        set -euo pipefail
        evidence_mode="development_placeholder"
        is_placeholder=true
        if [[ "${{ github.event_name }}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
          evidence_mode="official_sp08"
          is_placeholder=false
        fi

        selected_package="Node/Release/ProtocolPackages/SelectedProtocolPackage.json"
        package_id="$(jq -r '.packageId' "${selected_package}")"
        package_version="$(jq -r '.packageVersion' "${selected_package}")"
        release_manifest_hash="$(jq -r '.releaseManifestHash' "${selected_package}")"
        spec_package_hash="$(jq -r '.specPackageHash' "${selected_package}")"
        proof_package_hash="$(jq -r '.proofPackageHash' "${selected_package}")"
        package_manifest_path="Node/Release/ProtocolPackages/${package_version}/ProtocolOmegaPackageManifest.json"
        statement_map_path="Node/Release/ProtocolPackages/${package_version}/Protocol-Proof-And-Crypto-Review/Proof-Statement-To-Circuit-Map.md"
        spec_reference="$(jq -r '.specAccessLocations[0].location // empty' "${package_manifest_path}")"
        proof_reference="$(jq -r '.proofAccessLocations[0].location // empty' "${package_manifest_path}")"
        immutable_reference="${spec_reference}#releaseManifestHash=${release_manifest_hash}"

        protocol_artifact_digest="sha256:${release_manifest_hash}"
        package_manifest_file_hash="sha256:$(sha256sum "${package_manifest_path}" | cut -d' ' -f1)"
        statement_map_hash="sha256:$(sha256sum "${statement_map_path}" | cut -d' ' -f1)"
        circuit_hash="sha256:$(sha256sum hush-web-client/public/circuits/omega-v1.0.0/reaction.wasm | cut -d' ' -f1)"
        proving_key_hash="sha256:$(sha256sum hush-web-client/public/circuits/omega-v1.0.0/reaction.zkey | cut -d' ' -f1)"
        verifying_key_hash="sha256:$(sha256sum Node/HushServerNode/circuits/omega-v1.0.0/verification_key.json | cut -d' ' -f1)"

        jq -n \
          --arg componentId "protocol_package" \
          --arg componentType "protocol_package" \
          --arg evidenceMode "${evidence_mode}" \
          --arg artifactName "${package_id}-${package_version}" \
          --arg artifactDigest "${protocol_artifact_digest}" \
          --arg sourceCommit "${GITHUB_SHA}" \
          --arg sourceTag "${GITHUB_REF_NAME}" \
          --arg immutableReference "${immutable_reference}" \
          --arg buildWorkflowRunId "${GITHUB_RUN_ID}" \
          --arg packageId "${package_id}" \
          --arg packageVersion "${package_version}" \
          --arg releaseManifestHash "${release_manifest_hash}" \
          --arg specPackageHash "${spec_package_hash}" \
          --arg proofPackageHash "${proof_package_hash}" \
          --arg packageManifestFileHash "${package_manifest_file_hash}" \
          --arg specReference "${spec_reference}" \
          --arg proofReference "${proof_reference}" \
          --argjson isPlaceholder "${is_placeholder}" \
          '{
            componentId: $componentId,
            componentType: $componentType,
            evidenceMode: $evidenceMode,
            artifactName: $artifactName,
            artifactDigest: $artifactDigest,
            sourceCommit: $sourceCommit,
            sourceTag: $sourceTag,
            immutableReference: $immutableReference,
            buildWorkflowRunId: $buildWorkflowRunId,
            distributionReference: $immutableReference,
            signingFingerprint: null,
            isPlaceholder: $isPlaceholder,
            packageId: $packageId,
            packageVersion: $packageVersion,
            releaseManifestHash: $releaseManifestHash,
            specPackageHash: $specPackageHash,
            proofPackageHash: $proofPackageHash,
            packageManifestFileHash: $packageManifestFileHash,
            specReference: $specReference,
            proofReference: $proofReference
          }' > release-evidence/sp08-protocol-package-component.json

        jq -n \
          --arg circuitId "omega-v1.0.0" \
          --arg circuitHash "${circuit_hash}" \
          --arg provingKeyHash "${proving_key_hash}" \
          --arg verifyingKeyHash "${verifying_key_hash}" \
          --arg protocolPackageManifestHash "${release_manifest_hash}" \
          --arg statementCircuitMapPath "${statement_map_path}" \
          --arg statementCircuitMapHash "${statement_map_hash}" \
          '{
            circuitId: $circuitId,
            circuitHash: $circuitHash,
            provingKeyHash: $provingKeyHash,
            verifyingKeyHash: $verifyingKeyHash,
            protocolPackageManifestHash: $protocolPackageManifestHash,
            statementCircuitMapPath: $statementCircuitMapPath,
            statementCircuitMapHash: $statementCircuitMapHash
          }' > release-evidence/sp08-circuit-key-evidence.json

        {
          echo "### SP-08 Protocol Package And Circuit Evidence"
          echo ""
          echo "- Evidence mode: \`${evidence_mode}\`"
          echo "- Protocol package: \`${package_id}/${package_version}\`"
          echo "- Release manifest hash: \`${release_manifest_hash}\`"
          echo "- Circuit hash: \`${circuit_hash}\`"
          echo "- Proving key hash: \`${proving_key_hash}\`"
          echo "- Verifying key hash: \`${verifying_key_hash}\`"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload SP-08 protocol package and circuit key evidence
      uses: actions/upload-artifact@v4
      with:
        name: sp08-protocol-circuit-release-evidence
        path: |
          release-evidence/sp08-protocol-package-component.json
          release-evidence/sp08-circuit-key-evidence.json

    - name: Publish SP-08 protocol package and circuit key evidence to GitHub Release
      if: github.event_name == 'push' && github.ref_type == 'tag'
      working-directory: .
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Automated SP-08 release evidence for ${GITHUB_REF_NAME}."
        gh release upload "${GITHUB_REF_NAME}" \
          release-evidence/sp08-protocol-package-component.json \
          release-evidence/sp08-circuit-key-evidence.json \
          --clobber

  # ============================================
  # BUILD, PUSH & DEPLOY — only after CI passes
  # ============================================
  build-and-deploy:
    needs: [ci]
    runs-on: ubuntu-22.04
    environment: HushServerNode AWS CD

    permissions:
      contents: write
      packages: write

    steps:
      # ============================================
      # CHECKOUT & VERSION EXTRACTION
      # ============================================

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.version }}" ]]; then
              VERSION="${{ inputs.version }}"
            else
              VERSION="manual-$(date +%Y%m%d-%H%M%S)"
            fi
          else
            # Extract version from tag: HushServerNode-v1.2.3 -> 1.2.3
            VERSION=${GITHUB_REF#refs/tags/HushServerNode-v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # ============================================
      # BUILD & PUSH DOCKER IMAGE
      # ============================================

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Node/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write SP-08 server release component manifest
        env:
          IMAGE_DIGEST: ${{ steps.build_image.outputs.digest }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          evidence_mode="development_placeholder"
          is_placeholder=true
          immutable_reference="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          if [[ "${{ github.event_name }}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ -z "${IMAGE_DIGEST}" ]]; then
              echo "::error::Official SP-08 server evidence requires an immutable image digest."
              exit 1
            fi
            evidence_mode="official_sp08"
            is_placeholder=false
            immutable_reference="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"
          fi

          artifact_digest="${IMAGE_DIGEST:-sha256:$(printf '%s' "${GITHUB_SHA}:${IMAGE_TAG}:development-placeholder" | sha256sum | cut -d' ' -f1)}"
          dockerfile_hash="sha256:$(sha256sum Node/Dockerfile | cut -d' ' -f1)"
          mkdir -p release-evidence
          jq -n \
            --arg componentId "server" \
            --arg componentType "container_image" \
            --arg evidenceMode "${evidence_mode}" \
            --arg artifactName "hushservernode" \
            --arg artifactDigest "${artifact_digest}" \
            --arg sourceCommit "${GITHUB_SHA}" \
            --arg sourceTag "${GITHUB_REF_NAME}" \
            --arg immutableReference "${immutable_reference}" \
            --arg buildWorkflowRunId "${GITHUB_RUN_ID}" \
            --arg distributionReference "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}" \
            --arg dockerfileHash "${dockerfile_hash}" \
            --argjson isPlaceholder "${is_placeholder}" \
            '{
              componentId: $componentId,
              componentType: $componentType,
              evidenceMode: $evidenceMode,
              artifactName: $artifactName,
              artifactDigest: $artifactDigest,
              sourceCommit: $sourceCommit,
              sourceTag: $sourceTag,
              immutableReference: $immutableReference,
              buildWorkflowRunId: $buildWorkflowRunId,
              distributionReference: $distributionReference,
              signingFingerprint: null,
              isPlaceholder: $isPlaceholder,
              dockerfileHash: $dockerfileHash
            }' > release-evidence/sp08-server-component.json

          {
            echo "### SP-08 Server Release Evidence"
            echo ""
            echo "- Evidence mode: \`${evidence_mode}\`"
            echo "- Image digest: \`${artifact_digest}\`"
            echo "- Dockerfile hash: \`${dockerfile_hash}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SP-08 server release component manifest
        uses: actions/upload-artifact@v4
        with:
          name: sp08-server-release-component
          path: release-evidence/sp08-server-component.json

      - name: Publish SP-08 server release component manifest to GitHub Release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Automated SP-08 release evidence for ${GITHUB_REF_NAME}."
          gh release upload "${GITHUB_REF_NAME}" \
            release-evidence/sp08-server-component.json \
            --clobber

      - name: Write SP-08 audit package exporter release component manifest
        env:
          IMAGE_DIGEST: ${{ steps.build_image.outputs.digest }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          evidence_mode="development_placeholder"
          is_placeholder=true
          immutable_reference="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          if [[ "${{ github.event_name }}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ -z "${IMAGE_DIGEST}" ]]; then
              echo "::error::Official SP-08 audit package exporter evidence requires an immutable image digest."
              exit 1
            fi
            evidence_mode="official_sp08"
            is_placeholder=false
            immutable_reference="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"
          fi

          artifact_digest="${IMAGE_DIGEST:-sha256:$(printf '%s' "${GITHUB_SHA}:${IMAGE_TAG}:audit-package-exporter:development-placeholder" | sha256sum | cut -d' ' -f1)}"
          mkdir -p release-evidence
          jq -n \
            --arg componentId "audit_package_exporter" \
            --arg componentType "server_module_in_container" \
            --arg evidenceMode "${evidence_mode}" \
            --arg artifactName "HushNode.Elections.ElectionVerificationPackageExportService" \
            --arg artifactDigest "${artifact_digest}" \
            --arg sourceCommit "${GITHUB_SHA}" \
            --arg sourceTag "${GITHUB_REF_NAME}" \
            --arg immutableReference "${immutable_reference}" \
            --arg buildWorkflowRunId "${GITHUB_RUN_ID}" \
            --arg distributionReference "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}" \
            --arg serverImageDigest "${artifact_digest}" \
            --argjson isPlaceholder "${is_placeholder}" \
            '{
              componentId: $componentId,
              componentType: $componentType,
              evidenceMode: $evidenceMode,
              artifactName: $artifactName,
              artifactDigest: $artifactDigest,
              sourceCommit: $sourceCommit,
              sourceTag: $sourceTag,
              immutableReference: $immutableReference,
              buildWorkflowRunId: $buildWorkflowRunId,
              distributionReference: $distributionReference,
              signingFingerprint: null,
              isPlaceholder: $isPlaceholder,
              serverImageDigest: $serverImageDigest
            }' > release-evidence/sp08-audit-package-exporter-component.json

          {
            echo "### SP-08 Audit Package Exporter Evidence"
            echo ""
            echo "- Evidence mode: \`${evidence_mode}\`"
            echo "- Container digest: \`${artifact_digest}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SP-08 audit package exporter release component manifest
        uses: actions/upload-artifact@v4
        with:
          name: sp08-audit-package-exporter-release-component
          path: release-evidence/sp08-audit-package-exporter-component.json

      - name: Publish SP-08 audit package exporter release component manifest to GitHub Release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Automated SP-08 release evidence for ${GITHUB_REF_NAME}."
          gh release upload "${GITHUB_REF_NAME}" \
            release-evidence/sp08-audit-package-exporter-component.json \
            --clobber

      - name: Summary - Image pushed
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

      # ============================================
      # DEPLOY TO AWS LIGHTSAIL
      # ============================================

      - name: Verify AWS KMS custody config
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_KMS_KEY_ID: ${{ secrets.AWS_KMS_KEY_ID }}
          AWS_CLOSE_COUNTING_KMS_KEY_ID: ${{ secrets.AWS_CLOSE_COUNTING_KMS_KEY_ID }}
          AWS_KMS_ACCESS_KEY_ID: ${{ secrets.AWS_KMS_ACCESS_KEY_ID }}
          AWS_KMS_SECRET_ACCESS_KEY: ${{ secrets.AWS_KMS_SECRET_ACCESS_KEY }}
        run: |
          AWS_REGION="${AWS_REGION:-eu-central-1}"
          AWS_CLOSE_COUNTING_KMS_KEY_ID="${AWS_CLOSE_COUNTING_KMS_KEY_ID:-${AWS_KMS_KEY_ID}}"

          if [[ -z "${AWS_KMS_KEY_ID}" ]]; then
            echo "::error::Missing AWS_KMS_KEY_ID secret. Set it to the AWS KMS key id, key ARN, or alias for admin-only protected tally custody."
            exit 1
          fi

          if [[ -z "${AWS_CLOSE_COUNTING_KMS_KEY_ID}" ]]; then
            echo "::error::Missing close-counting KMS key id. Set AWS_CLOSE_COUNTING_KMS_KEY_ID or reuse AWS_KMS_KEY_ID."
            exit 1
          fi

          if [[ -z "${AWS_KMS_ACCESS_KEY_ID}" || -z "${AWS_KMS_SECRET_ACCESS_KEY}" ]]; then
            echo "::error::AWS_KMS_ACCESS_KEY_ID and AWS_KMS_SECRET_ACCESS_KEY are required for the GitHub-hosted KMS smoke test and Lightsail container runtime."
            exit 1
          fi

          export AWS_ACCESS_KEY_ID="${AWS_KMS_ACCESS_KEY_ID}"
          export AWS_SECRET_ACCESS_KEY="${AWS_KMS_SECRET_ACCESS_KEY}"
          export AWS_DEFAULT_REGION="${AWS_REGION}"

          kms_roundtrip() {
            local label="$1"
            local key_id="$2"
            local context="$3"
            local tmp_dir
            tmp_dir="$(mktemp -d)"
            printf 'hush-kms-smoke:%s' "${label}" > "${tmp_dir}/plain"

            aws kms describe-key --region "${AWS_REGION}" --key-id "${key_id}" >/dev/null
            aws kms encrypt \
              --region "${AWS_REGION}" \
              --key-id "${key_id}" \
              --plaintext "fileb://${tmp_dir}/plain" \
              --encryption-context "${context}" \
              --query CiphertextBlob \
              --output text | base64 -d > "${tmp_dir}/cipher"

            aws kms decrypt \
              --region "${AWS_REGION}" \
              --ciphertext-blob "fileb://${tmp_dir}/cipher" \
              --encryption-context "${context}" \
              --query Plaintext \
              --output text | base64 -d > "${tmp_dir}/decrypted"

            cmp "${tmp_dir}/plain" "${tmp_dir}/decrypted"
            rm -rf "${tmp_dir}"
          }

          kms_roundtrip \
            "admin-only" \
            "${AWS_KMS_KEY_ID}" \
            "hush-purpose=hush:elections:admin-only-protected-tally-scalar:v1,election-id=00000000-0000-0000-0000-000000000000,selected-profile-id=admin-prod-1of1,scalar-encoding=babyjubjub-scalar-decimal-v1"

          kms_roundtrip \
            "close-counting" \
            "${AWS_CLOSE_COUNTING_KMS_KEY_ID}" \
            "hush-purpose=hush:elections:close-counting-executor-session-key:v1,close-counting-job-id=00000000-0000-0000-0000-000000000000,key-algorithm=x25519-xsalsa20-poly1305-v1"

          echo "AWS KMS custody smoke checks passed."

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem

          # Add host to known_hosts to avoid prompt
          ssh-keyscan -H ${{ secrets.AWS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload Firebase service account to server
        env:
          SSH_HOST: ${{ secrets.AWS_HOST }}
          SSH_USER: ${{ secrets.AWS_SSH_USER }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Write the secret directly (stored as raw JSON, not base64)
          echo "${FIREBASE_SERVICE_ACCOUNT}" > /tmp/firebase-sa.json

          # Verify it's valid JSON
          if jq empty /tmp/firebase-sa.json 2>/dev/null; then
            echo "Valid JSON detected"
          else
            echo "Invalid JSON in FIREBASE_SERVICE_ACCOUNT secret"
            exit 1
          fi

          scp -i ~/.ssh/lightsail.pem /tmp/firebase-sa.json ${SSH_USER}@${SSH_HOST}:/mnt/hush_db_data/config/firebase-sa.json
          rm -f /tmp/firebase-sa.json
          echo "Firebase service account uploaded"

      - name: Ensure Firebase config in ApplicationSettings
        env:
          SSH_HOST: ${{ secrets.AWS_HOST }}
          SSH_USER: ${{ secrets.AWS_SSH_USER }}
        run: |
          # Add Firebase config to server's ApplicationSettings.json if not present
          ssh -i ~/.ssh/lightsail.pem -o ServerAliveInterval=30 -o ServerAliveCountMax=10 ${SSH_USER}@${SSH_HOST} 'bash -s' << 'CONFIG_SCRIPT'
            CONFIG_FILE="/mnt/hush_db_data/config/ApplicationSettings.json"

            # Check if Firebase section exists
            if ! grep -q '"Firebase"' "$CONFIG_FILE"; then
              echo "Adding Firebase config to ApplicationSettings.json..."
              # Use jq to add Firebase section
              jq '. + {"Firebase": {"ProjectId": "hushnetwork", "ServiceAccountPath": "./firebase-sa.json", "Enabled": true}}' \
                "$CONFIG_FILE" > "${CONFIG_FILE}.tmp" && mv "${CONFIG_FILE}.tmp" "$CONFIG_FILE"
              echo "Firebase config added"
            else
              echo "Firebase config already present"
            fi
          CONFIG_SCRIPT

      - name: Upload AWS KMS credentials to server
        env:
          SSH_HOST: ${{ secrets.AWS_HOST }}
          SSH_USER: ${{ secrets.AWS_SSH_USER }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_KMS_ACCESS_KEY_ID: ${{ secrets.AWS_KMS_ACCESS_KEY_ID }}
          AWS_KMS_SECRET_ACCESS_KEY: ${{ secrets.AWS_KMS_SECRET_ACCESS_KEY }}
        run: |
          AWS_REGION="${AWS_REGION:-eu-central-1}"

          if [ -z "${AWS_KMS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_KMS_SECRET_ACCESS_KEY:-}" ]; then
            echo "AWS KMS static credential secrets are required for this Lightsail Docker deployment."
            exit 1
          fi

          tmp_credentials="$(mktemp)"
          trap 'rm -f "${tmp_credentials}"' EXIT
          {
            printf '[hush-election-kms]\n'
            printf 'aws_access_key_id = %s\n' "${AWS_KMS_ACCESS_KEY_ID}"
            printf 'aws_secret_access_key = %s\n' "${AWS_KMS_SECRET_ACCESS_KEY}"
            printf 'region = %s\n' "${AWS_REGION}"
          } > "${tmp_credentials}"
          chmod 600 "${tmp_credentials}"

          scp -i ~/.ssh/lightsail.pem "${tmp_credentials}" ${SSH_USER}@${SSH_HOST}:/tmp/hush-aws-kms-credentials
          ssh -i ~/.ssh/lightsail.pem -o ServerAliveInterval=30 -o ServerAliveCountMax=10 ${SSH_USER}@${SSH_HOST} 'bash -s' << 'AWS_CREDS_INSTALL'
            set -e
            sudo install -d -m 700 -o root -g root /mnt/hush_db_data/config/aws
            sudo install -m 600 -o root -g root /tmp/hush-aws-kms-credentials /mnt/hush_db_data/config/aws/kms-credentials
            rm -f /tmp/hush-aws-kms-credentials
          AWS_CREDS_INSTALL

      - name: Deploy to AWS Lightsail
        env:
          SSH_HOST: ${{ secrets.AWS_HOST }}
          SSH_USER: ${{ secrets.AWS_SSH_USER }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}
          GHCR_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_KMS_KEY_ID: ${{ secrets.AWS_KMS_KEY_ID }}
          AWS_CLOSE_COUNTING_KMS_KEY_ID: ${{ secrets.AWS_CLOSE_COUNTING_KMS_KEY_ID }}
        run: |
          ssh -i ~/.ssh/lightsail.pem -o ServerAliveInterval=30 -o ServerAliveCountMax=10 ${SSH_USER}@${SSH_HOST} "IMAGE_TAG=${IMAGE_TAG}" "GHCR_IMAGE=${GHCR_IMAGE}" "AWS_REGION=${AWS_REGION}" "AWS_KMS_KEY_ID=${AWS_KMS_KEY_ID}" "AWS_CLOSE_COUNTING_KMS_KEY_ID=${AWS_CLOSE_COUNTING_KMS_KEY_ID}" 'bash -s' << 'DEPLOY_SCRIPT'
            set -e

            echo "Starting deployment of version ${IMAGE_TAG}..."
            : "${AWS_KMS_KEY_ID:?AWS_KMS_KEY_ID is required for admin-only protected tally custody.}"
            AWS_REGION="${AWS_REGION:-eu-central-1}"
            AWS_CLOSE_COUNTING_KMS_KEY_ID="${AWS_CLOSE_COUNTING_KMS_KEY_ID:-${AWS_KMS_KEY_ID}}"

            AWS_CREDENTIALS_DIR="/mnt/hush_db_data/config/aws"
            AWS_CREDENTIALS_FILE="${AWS_CREDENTIALS_DIR}/kms-credentials"
            AWS_CREDENTIALS_FILE_CONTAINER="/run/secrets/hush-aws-kms-credentials"
            AWS_PROFILE_NAME="hush-election-kms"
            if ! sudo test -s "${AWS_CREDENTIALS_FILE}"; then
              echo "AWS KMS credentials file is missing on the Lightsail host."
              exit 1
            fi

            # Pull the new image
            echo "Pulling new image..."
            sudo docker pull ${GHCR_IMAGE}:${IMAGE_TAG}

            # Stop and remove any existing HushNetworkNode containers (any version)
            echo "Stopping old container(s)..."
            sudo docker ps -q --filter "name=HushNetworkNode" | xargs -r sudo docker stop || true
            sudo docker ps -aq --filter "name=HushNetworkNode" | xargs -r sudo docker rm || true

            # Start new container with version in name
            CONTAINER_NAME="HushNetworkNode_v${IMAGE_TAG}"
            echo "Starting new container: ${CONTAINER_NAME}..."
            DOCKER_ENV_ARGS=(
              -e "Elections__AdminOnlyProtectedTallyEnvelope__Provider=aws-kms"
              -e "Elections__AdminOnlyProtectedTallyEnvelope__AwsKmsKeyId=${AWS_KMS_KEY_ID}"
              -e "Elections__AdminOnlyProtectedTallyEnvelope__AwsKmsRegion=${AWS_REGION}"
              -e "Elections__CloseCountingExecutorEnvelope__Provider=aws-kms"
              -e "Elections__CloseCountingExecutorEnvelope__AwsKmsKeyId=${AWS_CLOSE_COUNTING_KMS_KEY_ID}"
              -e "Elections__CloseCountingExecutorEnvelope__AwsKmsRegion=${AWS_REGION}"
              -e "Elections__Envelope__AllowLegacyNodeEncryptedEnvelopeValidation=false"
              -e "Elections__Envelope__AllowLegacyNodeEncryptedParticipantResultMaterial=false"
              -e "AWS_REGION=${AWS_REGION}"
              -e "AWS_SHARED_CREDENTIALS_FILE=${AWS_CREDENTIALS_FILE_CONTAINER}"
              -e "AWS_PROFILE=${AWS_PROFILE_NAME}"
            )

            sudo docker run -d \
              --name ${CONTAINER_NAME} \
              --restart always \
              --network HushNetwork \
              -p 4665:4665 \
              -p 127.0.0.1:4666:4666 \
              --env-file /mnt/hush_db_data/config/.env \
              "${DOCKER_ENV_ARGS[@]}" \
              -v /mnt/hush_db_data/config/stacker-credentials.dat:/app/stacker-credentials.dat:ro \
              -v /mnt/hush_db_data/config/ApplicationSettings.json:/app/ApplicationSettings.json:ro \
              -v /mnt/hush_db_data/config/firebase-sa.json:/app/firebase-sa.json:ro \
              -v "${AWS_CREDENTIALS_FILE}:${AWS_CREDENTIALS_FILE_CONTAINER}:ro" \
              ${GHCR_IMAGE}:${IMAGE_TAG}

            # Verify container is running
            echo "Verifying deployment..."
            sleep 5
            if sudo docker ps | grep -q "${CONTAINER_NAME}"; then
              echo "${CONTAINER_NAME} is running!"
              sudo docker ps --filter "name=HushNetworkNode" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            else
              echo "Container failed to start!"
              sudo docker logs ${CONTAINER_NAME} --tail 50
              exit 1
            fi

            echo "Deployment complete!"
          DEPLOY_SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/lightsail.pem

      - name: Deployment Summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Container:** \`HushNetworkNode_v${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** AWS Lightsail (Frankfurt)" >> $GITHUB_STEP_SUMMARY
          echo "**Admin-only protected tally custody:** AWS KMS" >> $GITHUB_STEP_SUMMARY
          echo "**Trustee close-counting executor custody:** AWS KMS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Endpoints:**" >> $GITHUB_STEP_SUMMARY
          echo "- gRPC-Web: \`https://api.hushnetwork.social\`" >> $GITHUB_STEP_SUMMARY
          echo "- Native gRPC: Port 4665" >> $GITHUB_STEP_SUMMARY
