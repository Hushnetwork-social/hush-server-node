syntax = "proto3";

option csharp_namespace = "HushNetwork.proto";

package rpcHush;

// Service for real-time notifications and unread tracking
service HushNotification {
  // Subscribe to real-time events (server streaming)
  rpc SubscribeToEvents(SubscribeToEventsRequest) returns (stream FeedEvent);

  // Mark a feed as read
  rpc MarkFeedAsRead(MarkFeedAsReadRequest) returns (MarkFeedAsReadReply);

  // Get current unread counts for all feeds
  rpc GetUnreadCounts(GetUnreadCountsRequest) returns (GetUnreadCountsReply);

  // Device Token Management (Push Notifications)
  rpc RegisterDeviceToken(RegisterDeviceTokenRequest) returns (RegisterDeviceTokenResponse);
  rpc UnregisterDeviceToken(UnregisterDeviceTokenRequest) returns (UnregisterDeviceTokenResponse);
  rpc GetActiveDeviceTokens(GetActiveDeviceTokensRequest) returns (GetActiveDeviceTokensResponse);

  // Social notification inbox and preference management (FEAT-091)
  rpc GetSocialNotificationInbox(GetSocialNotificationInboxRequest) returns (GetSocialNotificationInboxResponse);
  rpc MarkSocialNotificationRead(MarkSocialNotificationReadRequest) returns (MarkSocialNotificationReadResponse);
  rpc GetSocialNotificationPreferences(GetSocialNotificationPreferencesRequest) returns (GetSocialNotificationPreferencesResponse);
  rpc UpdateSocialNotificationPreferences(UpdateSocialNotificationPreferencesRequest) returns (UpdateSocialNotificationPreferencesResponse);
}

// Subscribe request
message SubscribeToEventsRequest {
  string UserId = 1;
  string DeviceId = 2;   // Optional: for analytics/debugging
  string Platform = 3;   // "browser", "tauri", "mobile-pwa"
}

// Event types
enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_NEW_MESSAGE = 1;
  EVENT_TYPE_MESSAGES_READ = 2;
  EVENT_TYPE_UNREAD_COUNT_SYNC = 3;
}

// Event pushed to clients via server streaming
message FeedEvent {
  EventType Type = 1;
  string FeedId = 2;

  // For NEW_MESSAGE events
  string SenderName = 3;
  string MessagePreview = 4;  // Max 255 chars

  // Current unread count for this feed
  int32 UnreadCount = 5;

  // For UNREAD_COUNT_SYNC events - all feed counts
  map<string, int32> AllCounts = 6;

  // Timestamp (Unix milliseconds)
  int64 TimestampUnixMs = 7;

  // FEAT-063: For MESSAGES_READ events - block index up to which user has read
  int64 UpToBlockIndex = 8;

  // For NEW_MESSAGE events in group feeds: the group name
  string FeedName = 9;
}

// Mark as read request
message MarkFeedAsReadRequest {
  string UserId = 1;
  string FeedId = 2;
  int64 UpToBlockIndex = 3;  // FEAT-051: Block index up to which user has read (optional, 0 = mark all as read)
}

message MarkFeedAsReadReply {
  bool Success = 1;
  string Message = 2;  // FEAT-051: Error message if failed
}

// Get unread counts request
message GetUnreadCountsRequest {
  string UserId = 1;
}

message GetUnreadCountsReply {
  map<string, int32> Counts = 1;  // feedId -> unread count
}

// =====================================================
// Device Token Management (Push Notifications)
// =====================================================

// Platform types for push notifications
enum PushPlatform {
  PUSH_PLATFORM_UNSPECIFIED = 0;
  PUSH_PLATFORM_ANDROID = 1;
  PUSH_PLATFORM_IOS = 2;
  PUSH_PLATFORM_WEB = 3;
}

// Register a device token for push notifications
message RegisterDeviceTokenRequest {
  string UserId = 1;
  PushPlatform Platform = 2;
  string Token = 3;
  string DeviceName = 4;  // Optional: device name for user reference
}

message RegisterDeviceTokenResponse {
  bool Success = 1;
  string Message = 2;  // Optional: error message if failed
}

// Unregister a device token (when user logs out or disables notifications)
message UnregisterDeviceTokenRequest {
  string UserId = 1;
  string Token = 2;
}

message UnregisterDeviceTokenResponse {
  bool Success = 1;
  string Message = 2;  // Optional: error message if failed
}

// Get active device tokens for a user (internal use by push delivery service)
message GetActiveDeviceTokensRequest {
  string UserId = 1;
}

message GetActiveDeviceTokensResponse {
  repeated DeviceTokenInfo Tokens = 1;
}

// Device token information
message DeviceTokenInfo {
  string Token = 1;
  PushPlatform Platform = 2;
  string DeviceName = 3;
}

// =====================================================
// FEAT-091 Social Notification Inbox and Preferences
// =====================================================

enum SocialNotificationVisibilityClass {
  SOCIAL_NOTIFICATION_VISIBILITY_CLASS_UNSPECIFIED = 0;
  SOCIAL_NOTIFICATION_VISIBILITY_CLASS_OPEN = 1;
  SOCIAL_NOTIFICATION_VISIBILITY_CLASS_CLOSE = 2;
}

enum SocialNotificationKind {
  SOCIAL_NOTIFICATION_KIND_UNSPECIFIED = 0;
  SOCIAL_NOTIFICATION_KIND_NEW_POST = 1;
  SOCIAL_NOTIFICATION_KIND_REACTION = 2;
  SOCIAL_NOTIFICATION_KIND_COMMENT = 3;
  SOCIAL_NOTIFICATION_KIND_REPLY = 4;
}

enum SocialNotificationTargetType {
  SOCIAL_NOTIFICATION_TARGET_TYPE_UNSPECIFIED = 0;
  SOCIAL_NOTIFICATION_TARGET_TYPE_POST = 1;
  SOCIAL_NOTIFICATION_TARGET_TYPE_COMMENT = 2;
  SOCIAL_NOTIFICATION_TARGET_TYPE_REPLY = 3;
}

message SocialNotificationItem {
  string NotificationId = 1;
  SocialNotificationKind Kind = 2;
  SocialNotificationVisibilityClass VisibilityClass = 3;
  SocialNotificationTargetType TargetType = 4;
  string TargetId = 5;
  string PostId = 6;
  string ParentCommentId = 7;
  string ActorUserId = 8;
  string ActorDisplayName = 9;
  string Title = 10;
  string Body = 11;
  bool IsRead = 12;
  bool IsPrivatePreviewSuppressed = 13;
  int64 CreatedAtUnixMs = 14;
  string DeepLinkPath = 15;
  repeated string MatchedCircleIds = 16;
}

message SocialCircleMuteState {
  string CircleId = 1;
  bool IsMuted = 2;
}

message SocialNotificationPreferences {
  bool OpenActivityEnabled = 1;
  bool CloseActivityEnabled = 2;
  repeated SocialCircleMuteState CircleMutes = 3;
  int64 UpdatedAtUnixMs = 4;
}

message GetSocialNotificationInboxRequest {
  string UserId = 1;
  int32 Limit = 2;
  bool IncludeRead = 3;
}

message GetSocialNotificationInboxResponse {
  repeated SocialNotificationItem Items = 1;
  bool HasMore = 2;
}

message MarkSocialNotificationReadRequest {
  string UserId = 1;
  string NotificationId = 2;
  bool MarkAll = 3;
}

message MarkSocialNotificationReadResponse {
  bool Success = 1;
  int32 UpdatedCount = 2;
  string Message = 3;
}

message GetSocialNotificationPreferencesRequest {
  string UserId = 1;
}

message GetSocialNotificationPreferencesResponse {
  SocialNotificationPreferences Preferences = 1;
}

message UpdateSocialNotificationPreferencesRequest {
  string UserId = 1;
  bool HasOpenActivityEnabled = 2;
  bool OpenActivityEnabled = 3;
  bool HasCloseActivityEnabled = 4;
  bool CloseActivityEnabled = 5;
  repeated SocialCircleMuteState CircleMutes = 6;
}

message UpdateSocialNotificationPreferencesResponse {
  bool Success = 1;
  string Message = 2;
  SocialNotificationPreferences Preferences = 3;
}
