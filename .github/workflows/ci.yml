# CI workflow for HushServerNode (.NET)
# Triggers on any code change (no path filter needed — whole repo is the server)

name: CI - HushServerNode

on:
  push:
    branches: [ "master" ]
    tags-ignore: [ '**' ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Node

    steps:
    - uses: actions/checkout@v5

    - name: Checkout hush-web-client
      uses: actions/checkout@v5
      with:
        repository: Hushnetwork-social/hush-web-client
        ref: master
        path: hush-web-client

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Setup Rust
      working-directory: .
      run: |
        rustup toolchain install stable --profile minimal
        rustup default stable

    - name: Setup Node
      uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: hush-web-client/package-lock.json

    - name: Install hush-web-client dependencies
      working-directory: hush-web-client
      run: npm ci

    - name: Restore dependencies
      run: dotnet restore

    - name: Build SP-07 Rust worker
      working-directory: Tools/HushSp07RustWorker
      run: cargo build --release --locked

    - name: Test SP-07 Rust worker
      working-directory: Tools/HushSp07RustWorker
      run: cargo test --release --locked

    - name: Build
      run: dotnet build --no-restore

    - name: Unit Tests
      env:
        HUSH_SERVER_NODE_ROOT: ${{ github.workspace }}
        HUSH_WEB_CLIENT_ROOT: ${{ github.workspace }}/hush-web-client
        HUSH_SP07_RUST_WORKER_PATH: ${{ github.workspace }}/Tools/HushSp07RustWorker/target/release/hush-sp07-rust-worker
      run: bash ../.github/scripts/run-dotnet-test-projects.sh
